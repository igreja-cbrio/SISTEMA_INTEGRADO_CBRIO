name: E2E (Playwright)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base do app (deixe vazio para usar PROD ou definir o preview)'
        required: false
        default: ''
      project:
        description: 'Projeto Playwright (chromium, mobile ou vazio para todos)'
        required: false
        default: ''

  # Roda automaticamente apos cada deploy de preview do Vercel
  deployment_status:

jobs:
  e2e:
    # Para deployment_status: so roda se for preview do Vercel pronto
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'deployment_status' &&
       github.event.deployment_status.state == 'success' &&
       contains(github.event.deployment.environment, 'Preview'))

    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Resolve E2E_BASE_URL
        id: resolve_url
        run: |
          if [ -n "${{ inputs.base_url }}" ]; then
            echo "url=${{ inputs.base_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "deployment_status" ]; then
            echo "url=${{ github.event.deployment_status.target_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${{ vars.E2E_DEFAULT_URL || 'https://crmcbrio.vercel.app' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Playwright tests
        env:
          E2E_BASE_URL: ${{ steps.resolve_url.outputs.url }}
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          CI: 'true'
        run: |
          if [ -n "${{ inputs.project }}" ]; then
            npx playwright test --project="${{ inputs.project }}"
          else
            npx playwright test
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/.report
          retention-days: 14

      - name: Upload trace/videos (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: e2e/.results
          retention-days: 7

      - name: Comment summary on PR
        if: github.event_name == 'deployment_status' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              const json = JSON.parse(fs.readFileSync('e2e/.report/results.json', 'utf8'));
              const stats = json.stats || {};
              const passed = stats.expected || 0;
              const failed = stats.unexpected || 0;
              const flaky = stats.flaky || 0;
              const skipped = stats.skipped || 0;
              const total = passed + failed + flaky + skipped;
              const icon = failed > 0 ? '❌' : '✅';
              summary = `${icon} **E2E (${{ steps.resolve_url.outputs.url }})**: ${passed}/${total} passou` +
                (failed ? `, ${failed} falhou` : '') +
                (flaky ? `, ${flaky} flaky` : '') +
                (skipped ? `, ${skipped} pulado` : '');
            } catch (e) {
              summary = '⚠️ E2E rodou mas nao foi possivel ler o relatorio.';
            }
            const sha = context.payload.deployment.sha;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner, repo: context.repo.repo, commit_sha: sha,
            });
            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr.number, body: summary,
              });
            }
